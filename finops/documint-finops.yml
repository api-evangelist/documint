  billingFrequency: Monthly / Annual
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
focusColumns:
  ServiceName: Documint
  ServiceCategory: Document Generation
  ProviderName: Documint
  PublisherName: Documint
