description: >-
  FOCUS-aligned FinOps profile for Documint. Billing is a flat monthly
  subscription per tier; each generated document counts as a merge against
  the plan's monthly bundle. REST API gating to Platinum+ is itself a cost
  decision — teams that need automation must step up to the API tier.
notes: >-
  Documint does not store payload data, simplifying compliance posture.
  Optimisation focuses on selecting the right tier (UI/integration vs.
  REST API) and right-sizing the merge bundle.
sources:
- https://documint.me/pricing
- https://focus.finops.org/focus-specification/v1-3/
