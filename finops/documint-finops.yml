meters:
- name: plan_subscription
  description: Flat monthly Documint plan fee.
  unit: month
  aggregation: sum
  dimensions:
  - account
  - tier
- name: merges
  description: Documents generated (1 merge per document).
  unit: merge
  aggregation: sum
  dimensions:
  - account
  - template
  - integration
- name: templates
  description: Active templates in account (informational; tier-bound).
  unit: template
  aggregation: max
  dimensions:
  - account
principles:
- name: Visibility
  description: Use Documint dashboard usage page; export merge counts per template.
- name: Allocation
  description: Use template naming or per-integration API keys to allocate cost.
- name: Optimization
  description: Right-size tier; use UI on lower tiers + REST only when automation required; consolidate similar templates.
- name: Accountability
  description: Assign template / integration owners; alert on monthly merge burn.
